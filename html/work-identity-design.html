<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Identity Design — Honest Graphics</title>
  <link rel="stylesheet" href="../css/work-pages.css"/>
</head>
<body data-work-page="identity-design">
  <div id="workPageRoot"></div>
  <script src="../js/work-pages-data.js?v=20260420b"></script>
  <script src="../js/work-page-builder.js?v=20260420b"></script>
  <script>
    (function () {
      function cleanIdentityPage() {
        if (document.body.getAttribute('data-work-page') !== 'identity-design') return;

        var sectionHeads = document.querySelectorAll('.section-head');
        sectionHeads.forEach(function (el) { el.remove(); });

        var images = document.querySelectorAll('.gallery-item img');
        images.forEach(function (img) {
          if (!img.complete || img.naturalWidth === 0) {
            var card = img.closest('.gallery-item');
            if (card) card.remove();
          }
        });
      }

      document.addEventListener('DOMContentLoaded', cleanIdentityPage);
      window.addEventListener('load', cleanIdentityPage);
    })();
  </script>
</body>
</html>
